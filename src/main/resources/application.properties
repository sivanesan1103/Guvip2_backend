spring.application.name=guviproject2
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:file:./data/quiz_app;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

app.jwt.secret=replace-with-a-long-random-secret-value-for-production
app.jwt.expiration-ms=86400000

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
 
app.mail.enabled=${APP_MAIL_ENABLED:false}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
